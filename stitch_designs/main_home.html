<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>To-Do Today</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#833cf6",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="checkbox"]:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="p-6 pb-2">
<div class="flex justify-between items-center mb-2">
<div>
<p class="text-primary font-semibold text-sm uppercase tracking-wider">Tuesday, Oct 24</p>
<h1 class="text-3xl font-bold tracking-tight">To-Do Today</h1>
</div>
<div class="size-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">account_circle</span>
</div>
</div>
</header>
<!-- Tabs Section -->
<div class="px-6 mb-4">
<div class="flex border-b border-primary/10">
<button class="flex-1 py-3 text-sm font-bold border-b-2 border-primary text-primary">
                Ongoing
            </button>
<button class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 dark:text-slate-500">
                Completed
            </button>
</div>
</div>
<!-- Task List Section -->
<main class="flex-1 px-4 overflow-y-auto space-y-3">
<!-- Task Item 1 -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl flex items-center justify-between shadow-sm border border-primary/5">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-2 border-primary/30 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 outline-none transition-all cursor-pointer" type="checkbox"/>
</div>
<div>
<p class="font-medium text-slate-900 dark:text-slate-100">Design UI for To-Do app</p>
<p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span> Due 5:00 PM
                    </p>
</div>
</div>
<div class="flex items-center gap-2 text-slate-400">
<button class="p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">edit</span>
</button>
<button class="p-2 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
<!-- Task Item 2 -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl flex items-center justify-between shadow-sm border border-primary/5">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-2 border-primary/30 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 outline-none transition-all cursor-pointer" type="checkbox"/>
</div>
<div>
<p class="font-medium text-slate-900 dark:text-slate-100">Review project requirements</p>
<p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">event</span> Tomorrow
                    </p>
</div>
</div>
<div class="flex items-center gap-2 text-slate-400">
<button class="p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">edit</span>
</button>
<button class="p-2 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
<!-- Task Item 3 -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl flex items-center justify-between shadow-sm border border-primary/5">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-2 border-primary/30 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 outline-none transition-all cursor-pointer" type="checkbox"/>
</div>
<div>
<p class="font-medium text-slate-900 dark:text-slate-100">Team sync meeting</p>
<p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1 font-semibold text-primary/80">
<span class="material-symbols-outlined text-[14px]">priority_high</span> High Priority
                    </p>
</div>
</div>
<div class="flex items-center gap-2 text-slate-400">
<button class="p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">edit</span>
</button>
<button class="p-2 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
<!-- Empty state visual placeholder if needed -->
<div class="py-8 flex flex-col items-center opacity-20">
<div class="w-full h-32 rounded-xl bg-gradient-to-r from-primary/10 to-transparent border-2 border-dashed border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl">add_task</span>
</div>
</div>
</main>
<!-- Bottom Input Area -->
<div class="p-6 bg-background-light dark:bg-background-dark border-t border-primary/10 sticky bottom-0">
<div class="relative flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-lg ring-1 ring-primary/10">
<button class="p-2 text-primary hover:bg-primary/5 rounded-lg transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder-slate-400 py-2" placeholder="Add a new task..." type="text"/>
<button class="bg-primary text-white size-10 flex items-center justify-center rounded-lg shadow-md shadow-primary/30 hover:bg-primary/90 transition-all active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Navigation Bar -->
<nav class="flex justify-around items-center border-t border-primary/5 bg-white dark:bg-slate-900 py-3 px-6">
<a class="flex flex-col items-center text-primary" href="#">
<span class="material-symbols-outlined">list</span>
<span class="text-[10px] font-bold mt-1">Tasks</span>
</a>
<a class="flex flex-col items-center text-slate-400" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-bold mt-1">Calendar</span>
</a>
<a class="flex flex-col items-center text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold mt-1">Settings</span>
</a>
</nav>
</body></html>
