<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#833cf6",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex flex-col min-h-screen w-full max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Top App Bar -->
<div class="flex items-center justify-between px-6 py-5">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Add Task</h2>
<button class="text-primary font-bold text-base hover:opacity-80 transition-opacity">
                Save
            </button>
</div>
<div class="flex-1 px-6 pb-8 space-y-8 overflow-y-auto">
<!-- Task Title Input -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                    Task Description
                </label>
<textarea class="w-full min-h-[160px] p-5 rounded-xl border-2 border-primary/10 bg-primary/5 focus:bg-white dark:focus:bg-slate-900 focus:border-primary focus:ring-0 text-xl font-medium text-slate-900 dark:text-slate-100 placeholder:text-slate-400 transition-all resize-none" placeholder="What needs to be done today?"></textarea>
</div>
<!-- Priority Selection -->
<div class="space-y-4">
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Priority</h3>
<div class="flex flex-wrap gap-3">
<button class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-primary/10 border-2 border-transparent hover:border-primary/30 transition-all group">
<span class="size-2 rounded-full bg-blue-500"></span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">Low</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-primary border-2 border-primary text-white transition-all">
<span class="size-2 rounded-full bg-white"></span>
<span class="text-sm font-semibold">Medium</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-primary/10 border-2 border-transparent hover:border-primary/30 transition-all group">
<span class="size-2 rounded-full bg-red-500"></span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">High</span>
</button>
</div>
</div>
<!-- Category Selection -->
<div class="space-y-4">
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Category</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center gap-3 p-4 rounded-xl border-2 border-primary/10 bg-background-light dark:bg-slate-800/50 hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-primary">work</span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">Work</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-xl border-2 border-primary/10 bg-background-light dark:bg-slate-800/50 hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-primary">home</span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">Personal</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-xl border-2 border-primary/10 bg-background-light dark:bg-slate-800/50 hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-primary">fitness_center</span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">Health</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-xl border-2 border-primary/10 bg-background-light dark:bg-slate-800/50 hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-primary">shopping_cart</span>
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">Groceries</span>
</button>
</div>
</div>
<!-- Due Date Helper -->
<div class="flex items-center justify-between p-4 rounded-xl bg-primary/5 border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Due Today, 5:00 PM</span>
</div>
<button class="text-sm font-bold text-primary">Change</button>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="p-6 border-t border-primary/10 bg-white dark:bg-background-dark">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 hover:opacity-90 transition-all active:scale-[0.98]">
                Create Task
            </button>
</div>
</div>
</body></html>
