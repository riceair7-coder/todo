<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Input - To-Do Today</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#833cf6",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Main Content (Blurred Background) -->
<header class="flex items-center p-4 justify-between border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">menu</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">To-Do Today</h2>
<div class="size-10 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">settings</span>
</div>
</header>
<main class="flex-1 p-4 space-y-4">
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-primary/5 shadow-sm">
<div class="flex items-center gap-3">
<div class="size-6 rounded-full border-2 border-primary/30"></div>
<span class="text-slate-600 dark:text-slate-400">Buy groceries for dinner tonight</span>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-primary/5 shadow-sm">
<div class="flex items-center gap-3">
<div class="size-6 rounded-full border-2 border-primary/30"></div>
<span class="text-slate-600 dark:text-slate-400">Call the bank about credit card</span>
</div>
</div>
</main>
<!-- Voice Input Overlay (Bottom Sheet Style) -->
<div class="absolute inset-0 z-50 flex flex-col justify-end bg-slate-900/40 backdrop-blur-sm">
<div class="bg-background-light dark:bg-background-dark w-full rounded-t-3xl shadow-2xl flex flex-col items-center px-6 pt-2 pb-10">
<!-- Pull Handle -->
<div class="h-1.5 w-12 rounded-full bg-primary/20 my-4"></div>
<div class="w-full max-w-md text-center">
<h3 class="text-primary text-sm font-semibold uppercase tracking-widest mb-2">Voice Input</h3>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight mb-8">Listening...</h1>
<!-- Sound Wave Visualization (Static Representation) -->
<div class="flex items-end justify-center gap-1 h-16 mb-10">
<div class="w-2 bg-primary/20 rounded-full h-4"></div>
<div class="w-2 bg-primary/40 rounded-full h-8"></div>
<div class="w-2 bg-primary/60 rounded-full h-12"></div>
<div class="w-2 bg-primary rounded-full h-16"></div>
<div class="w-2 bg-primary/60 rounded-full h-10"></div>
<div class="w-2 bg-primary/40 rounded-full h-6"></div>
<div class="w-2 bg-primary/20 rounded-full h-4"></div>
</div>
<!-- Real-time Transcription Area -->
<div class="min-h-[80px] mb-12">
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium leading-relaxed italic">
                            "Remind me to pick up the dry cleaning..."
                        </p>
</div>
<!-- Large Pulsing Microphone Button (Conceptual pulse with outer rings) -->
<div class="relative flex justify-center mb-12">
<div class="absolute inset-0 animate-ping rounded-full bg-primary/10 scale-150"></div>
<div class="absolute inset-0 animate-pulse rounded-full bg-primary/20 scale-125"></div>
<button class="relative z-10 size-24 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/40">
<span class="material-symbols-outlined text-4xl">mic</span>
</button>
</div>
<!-- Action Buttons -->
<div class="flex items-center gap-4 w-full">
<button class="flex-1 py-4 px-6 rounded-xl font-bold text-slate-500 bg-primary/5 hover:bg-primary/10 transition-colors">
                            Cancel
                        </button>
<button class="flex-1 py-4 px-6 rounded-xl font-bold text-white bg-primary shadow-md hover:opacity-90 transition-opacity">
                            Done
                        </button>
</div>
</div>
</div>
</div>
<!-- Floating Action Button for triggering voice (covered by overlay now) -->
<div class="fixed bottom-6 right-6">
<button class="size-14 bg-primary text-white rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined">mic</span>
</button>
</div>
</div>
</body></html>
